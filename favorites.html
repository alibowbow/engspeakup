<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="SpeakUp Studio 즐겨찾기 아카이브에서 저장한 사용자 문장과 AI 문장을 세션과 함께 다시 확인하고 정리할 수 있습니다."
    />
    <script>
      try {
        const raw = localStorage.getItem('speakup-studio-settings');
        const settings = raw ? JSON.parse(raw) : null;
        document.documentElement.dataset.theme = settings?.themeMode === 'dark' ? 'dark' : 'light';
      } catch {}
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
    <title>저장 문장 아카이브 | SpeakUp Studio</title>
  </head>
  <body>
    <div class="legacy-page">
      <section class="surface hero-card">
        <div>
          <div class="eyebrow">복습 아카이브</div>
          <h1 class="hero-title">다시 볼 가치가 있는 문장 모음</h1>
          <p class="hero-copy">
            저장해 둔 사용자 문장과 AI 문장을 다시 보고, 원래 세션으로 돌아가거나 한 번에 정리할 수 있습니다.
          </p>
        </div>
        <div class="hero-actions">
          <a class="btn btn-secondary" href="./index.html">앱으로 돌아가기</a>
          <button id="exportBtn" type="button" class="btn btn-primary">저장 문장 내보내기</button>
        </div>
      </section>

      <section class="stats-grid" id="statsGrid"></section>

      <section class="surface control-card">
        <input id="searchInput" class="field-grow" type="search" placeholder="저장한 문장이나 세션 이름 검색" />
        <select id="roleSelect" class="field-fixed">
          <option value="all">전체 역할</option>
          <option value="user">사용자만</option>
          <option value="assistant">AI만</option>
        </select>
        <button id="clearBtn" type="button" class="btn btn-danger">저장 문장 비우기</button>
      </section>

      <div class="results-header">
        <div>
          <div class="eyebrow">결과</div>
          <div class="results-count" id="resultsCount">0개</div>
        </div>
      </div>

      <main id="results"></main>
    </div>

    <script>
      const SESSIONS_KEY = 'speakup-studio-sessions';
      const ACTIVE_SESSION_KEY = 'speakup-studio-active-session-id';

      const searchInput = document.getElementById('searchInput');
      const roleSelect = document.getElementById('roleSelect');
      const results = document.getElementById('results');
      const resultsCount = document.getElementById('resultsCount');
      const statsGrid = document.getElementById('statsGrid');
      const exportBtn = document.getElementById('exportBtn');
      const clearBtn = document.getElementById('clearBtn');

      function safeRead(key, fallback) {
        try {
          const raw = localStorage.getItem(key);
          return raw ? JSON.parse(raw) : fallback;
        } catch {
          return fallback;
        }
      }

      function loadSessions() {
        return safeRead(SESSIONS_KEY, []);
      }

      function saveSessions(next) {
        localStorage.setItem(SESSIONS_KEY, JSON.stringify(next));
      }

      function formatDate(value) {
        return new Intl.DateTimeFormat('ko-KR', {
          month: 'short',
          day: 'numeric',
          hour: '2-digit',
          minute: '2-digit',
        }).format(new Date(value));
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      function createStat(label, value) {
        return `
          <div class="surface stat-card">
            <div class="stat-value">${escapeHtml(value)}</div>
            <div class="stat-label">${escapeHtml(label)}</div>
          </div>
        `;
      }

      function downloadJson(name, payload) {
        const url = URL.createObjectURL(new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' }));
        const anchor = document.createElement('a');
        anchor.href = url;
        anchor.download = name;
        anchor.click();
        URL.revokeObjectURL(url);
      }

      function openSession(sessionId) {
        localStorage.setItem(ACTIVE_SESSION_KEY, sessionId);
        location.href = './index.html';
      }

      function collectFavorites() {
        return loadSessions()
          .flatMap((session) =>
            (session.messages || [])
              .filter((message) => message.favorite)
              .map((message) => ({
                sessionId: session.id,
                sessionTitle: session.scenarioTitle,
                role: message.role,
                messageId: message.id,
                text: message.text,
                createdAt: message.createdAt,
              })),
          )
          .sort((a, b) => new Date(b.createdAt).getTime() - new Date(a.createdAt).getTime());
      }

      function filteredFavorites() {
        const query = searchInput.value.trim().toLowerCase();
        const role = roleSelect.value;
        return collectFavorites().filter((item) => {
          const roleMatch = role === 'all' ? true : item.role === role;
          if (!roleMatch) return false;
          if (!query) return true;
          return [item.text, item.sessionTitle, item.role].join(' ').toLowerCase().includes(query);
        });
      }

      function renderStats(items) {
        const userCount = items.filter((item) => item.role === 'user').length;
        const aiCount = items.filter((item) => item.role === 'assistant').length;
        const sessions = new Set(items.map((item) => item.sessionId)).size;
        statsGrid.innerHTML = [
          createStat('전체 저장 수', String(items.length)),
          createStat('사용자 문장', String(userCount)),
          createStat('AI 문장', String(aiCount)),
          createStat('연결된 세션', String(sessions)),
        ].join('');
      }

      function removeFavorite(sessionId, messageId) {
        const next = loadSessions().map((session) => {
          if (session.id !== sessionId) return session;
          return {
            ...session,
            messages: session.messages.map((message) =>
              message.id === messageId ? { ...message, favorite: false } : message,
            ),
          };
        });
        saveSessions(next);
        render();
      }

      function clearFavorites() {
        const next = loadSessions().map((session) => ({
          ...session,
          messages: session.messages.map((message) => ({ ...message, favorite: false })),
        }));
        saveSessions(next);
        render();
      }

      function render() {
        const all = collectFavorites();
        const items = filteredFavorites();
        renderStats(all);
        resultsCount.textContent = `${items.length}개`;

        if (!items.length) {
          results.innerHTML = `
            <section class="surface empty-card">
              <div class="empty-title">저장한 문장이 없습니다</div>
              <div class="empty-copy">채팅 화면의 저장 버튼으로 좋은 문장을 따로 모아 둘 수 있습니다.</div>
            </section>
          `;
          return;
        }

        results.innerHTML = `
          <div class="entry-list">
            ${items
              .map(
                (item) => `
                  <article class="surface entry-card">
                    <div class="entry-head">
                      <div>
                        <div class="entry-title">${escapeHtml(item.sessionTitle || '제목 없는 세션')}</div>
                        <div class="entry-meta">${formatDate(item.createdAt)}</div>
                      </div>
                      <div class="badge-row">
                        <span class="badge ${item.role === 'assistant' ? 'badge-green' : 'badge-blue'}">
                          ${item.role === 'assistant' ? 'AI 문장' : '사용자 문장'}
                        </span>
                      </div>
                    </div>

                    <div class="quote-card">
                      <div class="quote-label">저장한 문장</div>
                      <div class="quote-copy">${escapeHtml(item.text)}</div>
                    </div>

                    <div class="action-row">
                      <button type="button" class="btn btn-secondary" data-open="${escapeHtml(item.sessionId)}">세션 열기</button>
                      <button
                        type="button"
                        class="btn btn-danger"
                        data-remove="${escapeHtml(item.sessionId)}"
                        data-message="${escapeHtml(item.messageId)}"
                      >
                        저장 해제
                      </button>
                    </div>
                  </article>
                `,
              )
              .join('')}
          </div>
        `;

        results.querySelectorAll('[data-open]').forEach((button) => {
          button.addEventListener('click', () => {
            openSession(button.getAttribute('data-open'));
          });
        });

        results.querySelectorAll('[data-remove]').forEach((button) => {
          button.addEventListener('click', () => {
            removeFavorite(button.getAttribute('data-remove'), button.getAttribute('data-message'));
          });
        });
      }

      searchInput.addEventListener('input', render);
      roleSelect.addEventListener('change', render);

      exportBtn.addEventListener('click', () => {
        downloadJson(`speakup-favorites-${new Date().toISOString().slice(0, 10)}.json`, collectFavorites());
      });

      clearBtn.addEventListener('click', () => {
        if (!window.confirm('이 브라우저에 저장된 문장을 모두 해제할까요?')) return;
        clearFavorites();
      });

      render();
    </script>
  </body>
</html>
