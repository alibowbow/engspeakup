<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="SpeakUp Studio analysis archive with premium review cards for revision, grammar, naturalness, and session links."
    />
    <script>
      try {
        const raw = localStorage.getItem('speakup-studio-settings');
        const settings = raw ? JSON.parse(raw) : null;
        document.documentElement.dataset.theme = settings?.themeMode === 'dark' ? 'dark' : 'light';
      } catch {}
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
    <title>Analysis Archive | SpeakUp Studio</title>
  </head>
  <body>
    <div class="legacy-page">
      <section class="surface hero-card">
        <div>
          <div class="eyebrow">Review Archive</div>
          <h1 class="hero-title">Sentence analyses in one place</h1>
          <p class="hero-copy">
            Revisit revision notes, grammar fixes, naturalness hints, and session context without opening the main app first.
          </p>
        </div>
        <div class="hero-actions">
          <a class="btn btn-secondary" href="./index.html">Back To App</a>
          <button id="exportBtn" type="button" class="btn btn-primary">Export Analyses</button>
        </div>
      </section>

      <section class="stats-grid" id="statsGrid"></section>

      <section class="surface control-card">
        <input id="searchInput" class="field-grow" type="search" placeholder="Search scenario, sentence, or feedback" />
        <select id="sortSelect" class="field-fixed">
          <option value="newest">Newest first</option>
          <option value="oldest">Oldest first</option>
        </select>
        <button id="clearBtn" type="button" class="btn btn-danger">Clear Analyses</button>
      </section>

      <div class="results-header">
        <div>
          <div class="eyebrow">Results</div>
          <div class="results-count" id="resultsCount">0 items</div>
        </div>
      </div>

      <main id="results"></main>
    </div>

    <script>
      const STORAGE_KEY = 'speakup-studio-analyses';
      const ACTIVE_SESSION_KEY = 'speakup-studio-active-session-id';

      const searchInput = document.getElementById('searchInput');
      const sortSelect = document.getElementById('sortSelect');
      const results = document.getElementById('results');
      const resultsCount = document.getElementById('resultsCount');
      const statsGrid = document.getElementById('statsGrid');
      const exportBtn = document.getElementById('exportBtn');
      const clearBtn = document.getElementById('clearBtn');

      function safeRead(key, fallback) {
        try {
          const raw = localStorage.getItem(key);
          return raw ? JSON.parse(raw) : fallback;
        } catch {
          return fallback;
        }
      }

      function saveAnalyses(next) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(next));
      }

      function loadAnalyses() {
        return safeRead(STORAGE_KEY, []);
      }

      function formatDate(value) {
        return new Intl.DateTimeFormat('ko-KR', {
          month: 'short',
          day: 'numeric',
          hour: '2-digit',
          minute: '2-digit',
        }).format(new Date(value));
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      function listMarkup(items) {
        if (!items || !items.length) {
          return '<div class="mono">No items</div>';
        }
        return `<ul class="signal-list">${items.map((item) => `<li>${escapeHtml(item)}</li>`).join('')}</ul>`;
      }

      function createStat(label, value) {
        return `
          <div class="surface stat-card">
            <div class="stat-value">${escapeHtml(value)}</div>
            <div class="stat-label">${escapeHtml(label)}</div>
          </div>
        `;
      }

      function downloadJson(name, payload) {
        const url = URL.createObjectURL(new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' }));
        const anchor = document.createElement('a');
        anchor.href = url;
        anchor.download = name;
        anchor.click();
        URL.revokeObjectURL(url);
      }

      function openSession(sessionId) {
        localStorage.setItem(ACTIVE_SESSION_KEY, sessionId);
        location.href = './index.html';
      }

      function filteredAnalyses() {
        const query = searchInput.value.trim().toLowerCase();
        const sort = sortSelect.value;
        const items = loadAnalyses().filter((entry) => {
          if (!query) return true;
          const haystack = [
            entry.scenarioTitle,
            entry.sentence,
            entry.overview,
            entry.revision,
            ...(entry.strengths || []),
            ...(entry.grammar || []),
            ...(entry.naturalness || []),
          ]
            .join(' ')
            .toLowerCase();
          return haystack.includes(query);
        });

        items.sort((a, b) => {
          const left = new Date(a.createdAt).getTime();
          const right = new Date(b.createdAt).getTime();
          return sort === 'oldest' ? left - right : right - left;
        });

        return items;
      }

      function renderStats(items) {
        const weekAgo = Date.now() - 7 * 24 * 60 * 60 * 1000;
        const weekly = items.filter((item) => new Date(item.createdAt).getTime() >= weekAgo).length;
        const sessions = new Set(items.map((item) => item.sessionId)).size;
        const latest = items[0] ? formatDate(items[0].createdAt) : '-';

        statsGrid.innerHTML = [
          createStat('Total analyses', String(items.length)),
          createStat('This week', String(weekly)),
          createStat('Sessions linked', String(sessions)),
          createStat('Latest update', latest),
        ].join('');
      }

      function render() {
        const items = filteredAnalyses();
        const all = loadAnalyses()
          .slice()
          .sort((a, b) => new Date(b.createdAt).getTime() - new Date(a.createdAt).getTime());

        renderStats(all);
        resultsCount.textContent = `${items.length} item${items.length === 1 ? '' : 's'}`;

        if (!items.length) {
          results.innerHTML = `
            <section class="surface empty-card">
              <div class="empty-title">No analyses found</div>
              <div class="empty-copy">Run Analyze inside a chat session and the archive will fill automatically.</div>
            </section>
          `;
          return;
        }

        results.innerHTML = `
          <div class="entry-list">
            ${items
              .map(
                (entry) => `
                  <article class="surface entry-card">
                    <div class="entry-head">
                      <div>
                        <div class="entry-title">${escapeHtml(entry.scenarioTitle || 'Untitled session')}</div>
                        <div class="entry-meta">${formatDate(entry.createdAt)}</div>
                      </div>
                      <div class="badge-row">
                        <span class="badge badge-amber">Revision</span>
                        <span class="badge badge-neutral">${escapeHtml(entry.sessionId || 'No session')}</span>
                      </div>
                    </div>

                    <div class="overview-copy">${escapeHtml(entry.overview || '')}</div>

                    <div class="content-grid">
                      <div class="quote-card">
                        <div class="quote-label">Original sentence</div>
                        <div class="quote-copy">${escapeHtml(entry.sentence || '')}</div>
                      </div>
                      <div class="quote-card">
                        <div class="quote-label">Revision</div>
                        <div class="quote-copy">${escapeHtml(entry.revision || '')}</div>
                      </div>
                    </div>

                    <div class="signal-grid">
                      <div class="signal-card">
                        <div class="signal-title">Strengths</div>
                        ${listMarkup(entry.strengths)}
                      </div>
                      <div class="signal-card">
                        <div class="signal-title">Grammar</div>
                        ${listMarkup(entry.grammar)}
                      </div>
                      <div class="signal-card">
                        <div class="signal-title">Naturalness</div>
                        ${listMarkup(entry.naturalness)}
                      </div>
                    </div>

                    ${
                      entry.vocabulary && entry.vocabulary.length
                        ? `
                          <div class="action-row">
                            ${entry.vocabulary
                              .slice(0, 4)
                              .map(
                                (card) => `
                                  <span class="badge badge-green">${escapeHtml(card.phrase)}</span>
                                `,
                              )
                              .join('')}
                          </div>
                        `
                        : ''
                    }

                    <div class="action-row">
                      <button type="button" class="btn btn-secondary" data-session="${escapeHtml(entry.sessionId || '')}">
                        Open Session
                      </button>
                    </div>
                  </article>
                `,
              )
              .join('')}
          </div>
        `;

        results.querySelectorAll('[data-session]').forEach((button) => {
          button.addEventListener('click', () => {
            const sessionId = button.getAttribute('data-session');
            if (sessionId) openSession(sessionId);
          });
        });
      }

      searchInput.addEventListener('input', render);
      sortSelect.addEventListener('change', render);

      exportBtn.addEventListener('click', () => {
        downloadJson(`speakup-analyses-${new Date().toISOString().slice(0, 10)}.json`, loadAnalyses());
      });

      clearBtn.addEventListener('click', () => {
        if (!window.confirm('Delete all saved analyses from this browser?')) return;
        saveAnalyses([]);
        render();
      });

      render();
    </script>
  </body>
</html>
